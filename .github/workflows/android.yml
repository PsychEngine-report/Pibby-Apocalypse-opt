name: Release
on: 
  workflow_dispatch:
  workflow_call:
jobs:
  Android:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Setup Android NDK
        uses: nttld/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r21e

      - name: Set Java JDK
        uses: actions/setup-java@main
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1.2.0
        with:
          haxe-version: 4.2.5
      - name: Install Haxelib
        run: |
          haxelib setup ~/haxelib
          haxelib git hxcpp https://github.com/kittycathy233/hxcpp --quiet
          haxelib git lime https://github.com/Ethantobot11/lime-for-PA-OLD-PORT --quiet
          haxelib install openfl 9.2.2 --quiet
          haxelib --never install flixel 5.2.2 --quiet
          haxelib install flixel-tools --quiet
          haxelib install flixel-ui 2.4.0 --quiet
          haxelib install flixel-addons 2.11.0 --quiet
          haxelib install tjson --quiet
          haxelib install hxjsonast --quiet
          haxelib install hscript --quiet
          haxelib install hxvlc 1.9.0 --quiet
          haxelib git linc_luajit https://github.com/superpowers04/linc_luajit.git --quiet
          haxelib git extension-androidtools https://github.com/Default-name123/oldtools --quiet
          haxelib install hxcpp-debug-server --quiet
          haxelib install format --quiet
          haxelib install hxp --quiet
          haxelib list
      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION

      - name: Setup Lime
        run: |
          haxelib run lime setup -alias -y
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true
          haxelib set lime git
          haxelib set openfl 9.2.2 --always
          haxelib set flixel 5.2.2 --always
          haxelib set hxvlc 1.9.0 --always
          haxelib set flixel-ui 2.4.0 --always
          haxelib set flixel-addons 2.11.0 --always
          haxelib set hxcpp git
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Building
        run: haxelib run lime build android -release

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: androidBuild
          path: export/release/android/bin/app/build/outputs/apk/release
          if-no-files-found: warn
          
